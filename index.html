// ─── MAIN APP ───
const App=()=>{
  const[user,setUser]=useState(null);
  const[lastActive,setLastActive]=useState(Date.now());
  // Shared state
  const[participants,setParticipants]=useState(()=>LS.get('ccs_participants',[]));
  const[instructors,setInstructors]=useState(()=>LS.get('ccs_instructors',[]));
  const[events,setEvents]=useState(()=>LS.get('ccs_events',[]));
  const[adjustments,setAdjustments]=useState(()=>LS.get('ccs_adjustments',[]));
  const[mileage,setMileage]=useState(()=>LS.get('ccs_mileage',[]));
  const[notifications,setNotifications]=useState(()=>LS.get('ccs_notifications',[]));
  const[checkins,setCheckins]=useState(()=>LS.get('ccs_checkins',[]));
  const[supMeetings,setSupMeetings]=useState(()=>LS.get('ccs_sup_meetings',[]));
  const[users,setUsers]=useState(()=>LS.get('ccs_users',[]));
  const[activeTab,setActiveTab]=useState(0);

  // HIPAA auto-logout
  useEffect(()=>{
    const reset=()=>setLastActive(Date.now());
    const check=setInterval(()=>{if(user&&Date.now()-lastActive>HIPAA_MS){auditLog('AUTO_LOGOUT',`Session expired (HIPAA 15-min): ${user.username}`);_sessionUser=null;_sessionToken=null;sessionStorage.removeItem('ccs_token');setUser(null);}},30000);
    window.addEventListener('click',reset);window.addEventListener('keydown',reset);window.addEventListener('touchstart',reset);
    return()=>{clearInterval(check);window.removeEventListener('click',reset);window.removeEventListener('keydown',reset);window.removeEventListener('touchstart',reset);};
  },[user,lastActive]);

  const update=(key,val)=>{
    ({participants:setParticipants,instructors:setInstructors,events:setEvents,adjustments:setAdjustments,mileage:setMileage,notifications:setNotifications,checkins:setCheckins,supMeetings:setSupMeetings,users:setUsers})[key]?.(val);
  };

  if(!user)return h(LoginScreen,{onLogin:(u)=>{setUser(u);setActiveTab(0);}});

  const sharedProps={participants,instructors,events,adjustments,mileage,notifications,checkins,supMeetings,users,onUpdate:update,currentUser:user,onTabChange:setActiveTab};

  // ─── Role tab configs ───
  const adminTabs=[
    {label:'Today',icon:'home',component:AdminToday},
    {label:'Clients',icon:'users',component:AdminClients},
    {label:'Staff',icon:'staff',component:AdminStaff},
    {label:'Sups',icon:'shield',component:AdminSupervisors},
    {label:'Sched',icon:'calendar',component:AdminSupSched},
    {label:'Cal',icon:'grid',component:AdminCalendar},
    {label:'Assign',icon:'assign',component:AdminAssign},
    {label:'Alerts',icon:'bell',component:AdminAlerts},
    {label:'Reqs',icon:'msg',component:AdminRequests},
    {label:'Checkin',icon:'clipboard',component:AdminCheckins},
    {label:'Favs',icon:'star',component:AdminFavorites},
    {label:'Security',icon:'shield',component:AdminSecurity},
    {label:'Logins',icon:'settings',component:AdminLogins},
  ];
  const supTabs=[
    {label:'Team',icon:'users',component:SupTeam},
    {label:'Meetings',icon:'calendar',component:SupMeetings},
    {label:'GeoFence',icon:'map',component:SupGeoFence},
    {label:'Check-In',icon:'clipboard',component:SupCheckIn},
    {label:'Alerts',icon:'bell',component:SupAlerts},
    {label:'Profile',icon:'staff',component:ProfileTab},
  ];
  const instrTabs=[
    {label:'Today',icon:'home',component:InstrToday},
    {label:'Week',icon:'calendar',component:InstrWeek},
    {label:'Clients',icon:'users',component:InstrClients},
    {label:'Mileage',icon:'car',component:InstrMileage},
    {label:'Profile',icon:'staff',component:ProfileTab},
  ];
  const partTabs=(()=>{
    const p=participants.find(x=>x.id===user.participantId)||participants[0];
    const tabs=[
      {label:'Home',icon:'home',component:PartHome},
      {label:'Schedule',icon:'calendar',component:PartSchedule},
      {label:'Goals',icon:'target',component:PartGoals},
      {label:'Instructor',icon:'staff',component:PartInstructor},
      {label:'Rights',icon:'shield',component:PartRights},
    ];
    if(p?.housingEnabled){
      tabs.push({label:'Housing',icon:'home',component:PartHousing});
    }
    tabs.push({label:'Rate',icon:'star',component:PartRate});
    tabs.push({label:'Grievance',icon:'flag',component:PartGrievance});
    return tabs;
  })();

  const tabConfig={Admin:adminTabs,Supervisor:supTabs,Instructor:instrTabs,Participant:partTabs}[user.role]||adminTabs;
  const safeTab=Math.min(activeTab,tabConfig.length-1);
  const CurrentTab=tabConfig[safeTab].component;

  // Count alerts for badge
  const alertCount=(()=>{
    let c=notifications.filter(n=>!n.resolved).length;
    participants.forEach(p=>{const h=hrsRemaining(p,adjustments);if(h<=HOUR_WARN)c++;});
    return c;
  })();

  // Bottom nav (show up to 5 tabs as bottom nav, rest use scrollable top tabbar)
  const isParticipant=user.role==='Participant';
  const hasMoreTabs=tabConfig.length>5;

  const roleColor={Admin:'red',Supervisor:'orange',Instructor:'teal',Participant:'blue'}[user.role]||'blue';

  return h('div',{className:'app'},
    // Top bar
    h('div',{className:'topbar'},
      h('div',null,
        h('div',{style:{display:'flex',alignItems:'center',gap:6}},
          h('div',{className:'topbar-title'},'CCS Scheduler'),
          h('span',{style:{fontSize:9,fontWeight:700,color:'var(--green)',background:'rgba(34,197,94,0.12)',border:'1px solid rgba(34,197,94,0.25)',borderRadius:4,padding:'2px 5px',letterSpacing:0.5}},'🔒 HIPAA')
        ),
        h('div',{className:'topbar-sub'},tabConfig[safeTab].label)
      ),
      h('div',{className:'topbar-user'},
        alertCount>0&&h('div',{style:{background:'var(--red)',color:'#fff',borderRadius:12,padding:'2px 8px',fontSize:11,fontWeight:700}},alertCount),
        h('div',{className:'avatar',style:{background:`var(--${roleColor})`}},user.name.charAt(0)),
        h('button',{className:'btn btn-ghost btn-sm',onClick:()=>{auditLog('LOGOUT',`User logged out: ${user.username}`);_sessionUser=null;_sessionToken=null;sessionStorage.removeItem('ccs_token');setUser(null);},style:{padding:'6px 8px'}},h(Icon,{name:'logout',size:15}))
      )
    ),
    // Scrollable tab bar for admin (all tabs)
    hasMoreTabs&&h('div',{style:{background:'var(--bg2)',borderBottom:'1px solid var(--border)',padding:'6px 12px',overflowX:'auto',display:'flex',gap:4,scrollbarWidth:'none'}},
      tabConfig.map((t,i)=>h('button',{key:i,className:`tab-btn${safeTab===i?' active':''}`,onClick:()=>setActiveTab(i)},t.label))
    ),
    // Content
    h('div',{className:'content'},
      h(CurrentTab,{...sharedProps,key:safeTab})
    ),
    // Bottom nav
    !hasMoreTabs&&h('div',{className:'bottom-nav'},
      tabConfig.map((t,i)=>h('button',{key:i,className:`nav-item${safeTab===i?' active':''}`,onClick:()=>setActiveTab(i)},
        h(Icon,{name:t.icon,size:20,color:safeTab===i?'var(--blue)':'var(--text3)'}),
        h('span',{className:'nav-label'},t.label)
      ))
    )
  );
};

// ─── Boot ───
seedData();
migratePasswords();
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>

<title>CCS Scheduler</title>
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;CCS Scheduler&quot;,&quot;short_name&quot;:&quot;CCS&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#0f172a&quot;,&quot;theme_color&quot;:&quot;#3b82f6&quot;}"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
:root{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--card:#1e293b;--border:#334155;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --blue:#3b82f6;--blue2:#2563eb;--green:#22c55e;--red:#ef4444;
  --yellow:#eab308;--orange:#f97316;--purple:#a855f7;--teal:#14b8a6;
  --radius:12px;--radius-sm:8px;--shadow:0 4px 24px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;}
/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}
/* Layout */
.app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-title{font-size:18px;font-weight:700;color:var(--blue);letter-spacing:-0.5px;}
.topbar-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.topbar-user{display:flex;align-items:center;gap:8px;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--blue2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;}
.content{flex:1;padding:16px;padding-bottom:80px;overflow-y:auto;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-item{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--text3);transition:color 0.15s;}
.nav-item.active{color:var(--blue);}
.nav-item svg{width:20px;height:20px;}
.nav-label{font-size:9px;font-weight:600;letter-spacing:0.3px;text-transform:uppercase;}
/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;}
/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-blue{background:rgba(59,130,246,0.15);color:var(--blue);}
.badge-green{background:rgba(34,197,94,0.15);color:var(--green);}
.badge-red{background:rgba(239,68,68,0.15);color:var(--red);}
.badge-yellow{background:rgba(234,179,8,0.15);color:var(--yellow);}
.badge-orange{background:rgba(249,115,22,0.15);color:var(--orange);}
.badge-purple{background:rgba(168,85,247,0.15);color:var(--purple);}
.badge-teal{background:rgba(20,184,166,0.15);color:var(--teal);}
.badge-gray{background:rgba(100,116,139,0.15);color:var(--text2);}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;}
.btn-primary{background:var(--blue);color:#fff;}.btn-primary:hover{background:var(--blue2);}
.btn-success{background:var(--green);color:#fff;}
.btn-danger{background:var(--red);color:#fff;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue);}
.btn-sm{padding:6px 10px;font-size:11px;}
.btn-block{width:100%;}
/* Form */
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500;}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:14px;outline:none;transition:border-color 0.15s;}
.form-input:focus{border-color:var(--blue);}
.form-select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:14px;outline:none;appearance:none;}
/* Section */
.section-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
/* Alert */
.alert{padding:12px 14px;border-radius:var(--radius-sm);margin-bottom:10px;display:flex;gap:10px;align-items:flex-start;}
.alert-red{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--red);}
.alert-yellow{background:rgba(234,179,8,0.1);border:1px solid rgba(234,179,8,0.3);color:var(--yellow);}
.alert-blue{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);color:var(--blue);}
.alert-green{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:var(--green);}
/* Date strip */
.date-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;scrollbar-width:none;}
.date-strip::-webkit-scrollbar{display:none;}
.date-chip{flex-shrink:0;padding:8px 12px;border-radius:10px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all 0.15s;background:var(--bg2);}
.date-chip.active{background:var(--blue);border-color:var(--blue);}
.date-chip.today{border-color:var(--blue2);}
.date-chip-day{font-size:10px;color:var(--text3);text-transform:uppercase;}
.date-chip.active .date-chip-day{color:rgba(255,255,255,0.8);}
.date-chip-num{font-size:18px;font-weight:700;}
/* Login */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg);}
.login-logo{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#fff;margin-bottom:20px;box-shadow:0 8px 32px rgba(59,130,246,0.4);}
.login-title{font-size:26px;font-weight:800;color:var(--text);margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:32px;}
.login-card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:var(--bg3);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;}
/* Star rating */
.stars{display:flex;gap:4px;}
.star{font-size:24px;cursor:pointer;transition:transform 0.1s;}
.star:hover{transform:scale(1.2);}
/* Chips */
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;background:var(--bg3);color:var(--text2);margin:2px;}
/* Search */
.search-wrap{position:relative;margin-bottom:14px;}
.search-wrap input{padding-left:36px;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);}
/* Row */
.row{display:flex;align-items:center;justify-content:space-between;}
.col{display:flex;flex-direction:column;gap:4px;}
/* Tabs */
.tab-bar{display:flex;gap:4px;margin-bottom:16px;background:var(--bg2);padding:4px;border-radius:10px;overflow-x:auto;}
.tab-btn{flex-shrink:0;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--text3);transition:all 0.15s;white-space:nowrap;}
.tab-btn.active{background:var(--blue);color:#fff;}
/* Scrollable tabs */
.tab-bar::-webkit-scrollbar{display:none;}
/* Session card */
.session-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.session-card.absent{border-color:rgba(239,68,68,0.4);background:rgba(239,68,68,0.05);}
.session-card.adjusted{border-color:rgba(234,179,8,0.4);}
/* Progress bar */
.progress-wrap{background:var(--bg3);border-radius:4px;height:6px;margin-top:6px;}
.progress-bar{height:100%;border-radius:4px;transition:width 0.3s;}
/* Hr chip */
.hr-chip{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;}
/* Toggle */
.toggle{display:flex;align-items:center;gap:8px;cursor:pointer;}
.toggle-track{width:40px;height:22px;border-radius:11px;background:var(--bg3);position:relative;transition:background 0.2s;}
.toggle-track.on{background:var(--blue);}
.toggle-thumb{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.toggle-track.on .toggle-thumb{left:20px;}
/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:8px;}
/* Fade-in */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp 0.25s ease forwards;}
/* Grid 2col */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
/* Mileage */
.mile-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.mile-row:last-child{border-bottom:none;}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef,useCallback,useMemo}=React;
const h=React.createElement;

// ─── Constants ───
const HIPAA_MS=15*60*1000;
const FENCE_M=180;
const DAILY_MILE_ALERT=10;
const HOUR_WARN=5;
const LATE_CHANGE_MIN=30;
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAYS_FULL=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const AVAIL_BLOCKS=['12am-4am','4am-8am','8am-12pm','12pm-4pm','4pm-8pm','8pm-12am'];
const MTG_TYPES=['Field Visit','Office Meeting','Phone Call','Training','Observation','Other'];
const AGENCIES=['ALTA','VMRC'];

// ═══════════════════════════════════════════════════════
// HIPAA SECURITY & ENCRYPTION ENGINE
// AES-256-CBC · PBKDF2 Password Hashing · Audit Trail
// ═══════════════════════════════════════════════════════

const APP_ID = 'CCS_SCHEDULER_V4';
const PBKDF2_ITERATIONS = 10000;
const PBKDF2_KEYSIZE = 256 / 32;
const MAX_LOGIN_ATTEMPTS = 5;
const LOCKOUT_MS = 15 * 60 * 1000; // 15 min lockout

// ─── In-memory session (never persisted) ───
let _sessionKey = null;     // AES key for this session
let _sessionUser = null;    // current user
let _sessionToken = null;   // random session token

// ─── Salt management ───
const _getSalt = () => {
  let salt = localStorage.getItem('ccs_salt');
  if (!salt) {
    salt = CryptoJS.lib.WordArray.random(128 / 8).toString();
    localStorage.setItem('ccs_salt', salt);
  }
  return salt;
};

// ─── Key derivation ───
// Master data key is derived from APP_ID + device salt (not user password)
// so all users can read shared data. Passwords are hashed separately.
const _deriveDataKey = () => {
  const salt = _getSalt();
  return CryptoJS.PBKDF2(APP_ID + '_DATA', salt, {
    keySize: PBKDF2_KEYSIZE,
    iterations: PBKDF2_ITERATIONS
  });
};

// Derive key lazily once per page load
let _dataKey = null;
const getDataKey = () => {
  if (!_dataKey) _dataKey = _deriveDataKey();
  return _dataKey;
};

// ─── Encrypt / Decrypt ───
const encrypt = (data) => {
  try {
    const json = JSON.stringify(data);
    const iv = CryptoJS.lib.WordArray.random(128 / 8);
    const encrypted = CryptoJS.AES.encrypt(json, getDataKey(), {
      iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7
    });
    return iv.toString() + ':' + encrypted.toString();
  } catch { return null; }
};

const decrypt = (ciphertext, fallback) => {
  try {
    const [ivHex, enc] = ciphertext.split(':');
    if (!ivHex || !enc) return fallback;
    const iv = CryptoJS.enc.Hex.parse(ivHex);
    const decrypted = CryptoJS.AES.decrypt(enc, getDataKey(), {
      iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7
    });
    return JSON.parse(decrypted.toString(CryptoJS.enc.Utf8));
  } catch { return fallback; }
};

// ─── Password hashing (PBKDF2 + per-user salt) ───
const hashPassword = (password, salt) => {
  const s = salt || CryptoJS.lib.WordArray.random(128 / 8).toString();
  const hash = CryptoJS.PBKDF2(password, s, {
    keySize: PBKDF2_KEYSIZE, iterations: PBKDF2_ITERATIONS
  }).toString();
  return { hash, salt: s };
};

const verifyPassword = (password, storedHash, storedSalt) => {
  const { hash } = hashPassword(password, storedSalt);
  return hash === storedHash;
};

// ─── Encrypted Storage ───
const LS = {
  get: (k, d = []) => {
    try {
      const raw = localStorage.getItem(k);
      if (!raw) return d;
      // Try decryption first; fall back to plain JSON for legacy/seeded data
      if (raw.includes(':')) {
        const val = decrypt(raw, null);
        if (val !== null) return val;
      }
      return JSON.parse(raw);
    } catch { return d; }
  },
  set: (k, v) => {
    try {
      const cipher = encrypt(v);
      if (cipher) localStorage.setItem(k, cipher);
      else localStorage.setItem(k, JSON.stringify(v));
    } catch {}
  },
  remove: (k) => { localStorage.removeItem(k); }
};

// ─── Audit Trail ───
const auditLog = (action, detail, user) => {
  try {
    const entry = {
      id: Math.random().toString(36).slice(2) + Date.now().toString(36),
      ts: new Date().toISOString(),
      user: user || (_sessionUser ? `${_sessionUser.username} (${_sessionUser.role})` : 'unknown'),
      action,
      detail,
      ip: 'client-side'
    };
    const logs = LS.get('ccs_audit', []);
    // Keep last 500 entries
    const trimmed = [...logs, entry].slice(-500);
    LS.set('ccs_audit', trimmed);
  } catch {}
};

// ─── Login attempt tracking ───
const getAttempts = (username) => {
  try {
    const raw = localStorage.getItem('ccs_attempts');
    const all = raw ? JSON.parse(raw) : {};
    return all[username] || { count: 0, lastAt: 0 };
  } catch { return { count: 0, lastAt: 0 }; }
};
const setAttempts = (username, count) => {
  try {
    const raw = localStorage.getItem('ccs_attempts');
    const all = raw ? JSON.parse(raw) : {};
    all[username] = { count, lastAt: Date.now() };
    localStorage.setItem('ccs_attempts', JSON.stringify(all));
  } catch {}
};
const clearAttempts = (username) => setAttempts(username, 0);
const isLockedOut = (username) => {
  const a = getAttempts(username);
  if (a.count >= MAX_LOGIN_ATTEMPTS) {
    if (Date.now() - a.lastAt < LOCKOUT_MS) return true;
    clearAttempts(username); // lockout expired
  }
  return false;
};

// ─── Session token ───
const createSessionToken = () => {
  _sessionToken = CryptoJS.lib.WordArray.random(128 / 8).toString();
  sessionStorage.setItem('ccs_token', _sessionToken);
};
const validateSession = () => {
  const stored = sessionStorage.getItem('ccs_token');
  return stored && stored === _sessionToken;
};

// ─── Storage helpers (plain, non-PHI) ───
const LSraw = {
  get: (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};

// ─── Migration: hash plaintext passwords on first encrypted boot ───
const migratePasswords = () => {
  const migrated = LSraw.get('ccs_pwd_migrated', false);
  if (migrated) return;
  const users = LS.get('ccs_users', []);
  if (!users.length) return;
  const updated = users.map(u => {
    if (u.passwordHash) return u; // already hashed
    if (!u.password) return u;
    const { hash, salt } = hashPassword(u.password);
    return { ...u, passwordHash: hash, passwordSalt: salt, password: undefined };
  });
  LS.set('ccs_users', updated);
  LSraw.set('ccs_pwd_migrated', true);
  auditLog('SYSTEM', 'Password migration: all passwords hashed with PBKDF2', 'system');
};

// ─── ID generator ───
const uid=()=>Math.random().toString(36).slice(2,10)+Date.now().toString(36);

// ─── Date helpers ───
const todayStr=()=>{const d=new Date();return d.toISOString().slice(0,10);};
const ymStr=(d=new Date())=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const dayOfWeek=(dateStr)=>{const d=new Date(dateStr+'T12:00:00');return DAYS[d.getDay()===0?6:d.getDay()-1];};
const formatDate=(s)=>{const d=new Date(s+'T12:00:00');return `${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;};
const formatTime=(t)=>{if(!t)return '';const[h,m]=t.split(':');const hr=parseInt(h);return `${hr%12||12}:${m}${hr<12?'am':'pm'}`;};
const getDaysInMonth=(y,m)=>new Date(y,m,0).getDate();
const getMonthDates=(ym)=>{const[y,m]=ym.split('-').map(Number);const days=[];const total=getDaysInMonth(y,m);for(let d=1;d<=total;d++){const ds=`${ym}-${String(d).padStart(2,'0')}`;days.push(ds);}return days;};
const parseTime=(t)=>{if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m;};
const minToTime=(m)=>`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
const timeDiffMin=(a,b)=>{const am=parseTime(a),bm=parseTime(b);return bm-am;};

// ─── Hour calculations ───
const scheduledHrsMonth=(p,ym)=>{
  if(!p.schedule)return 0;
  const dates=getMonthDates(ym);
  let mins=0;
  dates.forEach(ds=>{
    const dow=dayOfWeek(ds);
    const sched=p.schedule[dow];
    if(!sched)return;
    ['a','b'].forEach(slot=>{
      const s=sched[slot];
      if(s&&s.start&&s.end)mins+=Math.max(0,timeDiffMin(s.start,s.end));
    });
  });
  return mins/60;
};
const adjustedMinsMonth=(pid,adjustments,ym)=>{
  return adjustments.filter(a=>a.participantId===pid&&a.date&&a.date.startsWith(ym)).reduce((s,a)=>s+(a.minsLost||0),0);
};
const hrsRemaining=(p,adjustments)=>{
  const ym=ymStr();
  const sched=scheduledHrsMonth(p,ym);
  const adjMins=adjustedMinsMonth(p.id,adjustments,ym)/60;
  return (p.maxHrsMonth||0)-sched-adjMins;
};

// ─── Seed default data ───
const seedData=()=>{
  if(LSraw.get('ccs_seeded_v5',false))return;
  // Clear ALL old data unconditionally
  ['ccs_instructors','ccs_participants','ccs_users','ccs_events','ccs_adjustments',
   'ccs_mileage','ccs_notifications','ccs_attendance','ccs_checkins','ccs_sup_meetings',
   'ccs_audit','ccs_seeded','ccs_seeded_v2','ccs_seeded_v3','ccs_attempts','ccs_pwd_migrated'].forEach(k=>localStorage.removeItem(k));
  const supervisors=[
    {id:'sup1',active:true,agency:'ALTA',role:'Supervisor',name:'Maria Gonzalez',phone:'916-555-0101',officePhone:'916-555-0200',address:'Sacramento, CA 95814',managedInstructors:['ins1','ins2'],availability:{Mon:['8am-12pm','12pm-4pm'],Tue:['8am-12pm','12pm-4pm'],Wed:['8am-12pm'],Thu:['8am-12pm','12pm-4pm'],Fri:['8am-12pm']}},
    {id:'sup2',active:true,agency:'VMRC',role:'Supervisor',name:'James Carter',phone:'209-555-0102',officePhone:'209-555-0201',address:'Stockton, CA 95202',managedInstructors:['ins3'],availability:{Mon:['8am-12pm','12pm-4pm'],Tue:['8am-12pm'],Wed:['8am-12pm','12pm-4pm'],Thu:['8am-12pm'],Fri:['8am-12pm','12pm-4pm']}},
  ];

  const color=hrs<=0?'#ef4444':hrs<=5?'#eab308':'#22c55e';
  const bg=hrs<=0?'rgba(239,68,68,0.15)':hrs<=5?'rgba(234,179,8,0.15)':'rgba(34,197,94,0.15)';
  return h('span',{className:'hr-chip',style:{background:bg,color}},`${hrs.toFixed(1)}h left`);
};

// ─── DateStrip ───
const DateStrip=({selected,onChange,range=7})=>{
  const today=new Date();
  const dates=[];
  for(let i=-range;i<=range;i++){
    const d=new Date(today);d.setDate(today.getDate()+i);
    dates.push(d.toISOString().slice(0,10));
  }
  const ref=useRef(null);
  useEffect(()=>{if(ref.current){const idx=dates.indexOf(selected);const el=ref.current.children[idx];if(el)el.scrollIntoView({inline:'center',behavior:'smooth'});}});
  return h('div',{className:'date-strip',ref},
    dates.map(ds=>{
      const d=new Date(ds+'T12:00:00');
      const isToday=ds===todayStr();
      const active=ds===selected;
      return h('div',{key:ds,className:`date-chip${active?' active':''}${isToday&&!active?' today':''}`,onClick:()=>onChange(ds)},
        h('div',{className:'date-chip-day'},DAYS[d.getDay()===0?6:d.getDay()-1]),
        h('div',{className:'date-chip-num',style:{color:active?'#fff':isToday?'var(--blue)':'var(--text)'}},d.getDate())
      );
    })
  );
};

const bufToB64=(buf)=>btoa(String.fromCharCode(...new Uint8Array(buf)));
const b64ToBuf=(b64)=>{const bin=atob(b64);const buf=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);return buf.buffer;};
const webAuthnAvailable=()=>!!(window.PublicKeyCredential&&navigator.credentials);

const registerBiometric=async(user)=>{
  const challenge=crypto.getRandomValues(new Uint8Array(32));
  const cred=await navigator.credentials.create({publicKey:{
    challenge,
    rp:{name:'CCS Scheduler',id:location.hostname||'localhost'},
    user:{id:new TextEncoder().encode(user.id||user.username),name:user.username,displayName:user.name||user.username},
    pubKeyCredParams:[{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],
    authenticatorSelection:{authenticatorAttachment:'platform',residentKey:'preferred',userVerification:'required'},
    timeout:60000
  }});
  const credId=bufToB64(cred.rawId);
  const stored=LSraw.get('ccs_biometrics',{});
  stored[user.username]=credId;
  LSraw.set('ccs_biometrics',stored);
  return true;
};

const loginWithBiometric=async(username)=>{
  const stored=LSraw.get('ccs_biometrics',{});
  const credId=username?stored[username]:null;
  const allowCreds=credId?[{id:b64ToBuf(credId),type:'public-key',transports:['internal']}]:[];
  const challenge=crypto.getRandomValues(new Uint8Array(32));
  const assertion=await navigator.credentials.get({publicKey:{
    challenge,
    allowCredentials:allowCreds,
    userVerification:'required',
    timeout:60000
  }});
  return assertion;
};

const hasBiometric=(username)=>{
  const stored=LSraw.get('ccs_biometrics',{});
  return username?!!stored[username]:Object.keys(stored).length>0;
};

    _sessionUser=user;
    auditLog('LOGIN_SUCCESS',`User logged in: ${user.username} (${user.role})`);
    onLogin(user);
  };

  // Biometric-first login (no username needed if resident key)
  const doBioLogin=async()=>{
    if(!hipaaAck){setError('Please acknowledge the HIPAA notice first.');return;}
    setBioStatus('scanning');setError('');setLoading(true);
    try{
      const assertion=await loginWithBiometric(username||null);
      if(!assertion){setError('Biometric failed. Try password.');setLoading(false);setBioStatus('');return;}
      // Find user by username
      const users=LS.get('ccs_users',[]);
      let user=username?users.find(u=>u.username===username):null;
      // If no username typed, try to get it from the credential response (resident key)
      if(!user&&assertion.response?.userHandle){
        const decoded=new TextDecoder().decode(assertion.response.userHandle);
        user=users.find(u=>u.id===decoded||u.username===decoded);
      }
      if(!user){setError('Account not found. Please type your username.');setLoading(false);setBioStatus('');return;}
      setBioStatus('success');
      auditLog('LOGIN_BIOMETRIC',`Biometric login: ${user.username} (${user.role})`);
      setTimeout(()=>finishLogin(user),600);
    }catch(e){
      if(e.name==='NotAllowedError'){setError('Biometric cancelled or not recognized.');}
      else if(e.name==='InvalidStateError'){setError('No face ID registered for this account.');}
      else{setError('Biometric unavailable. Use password below.');}
      setLoading(false);setBioStatus('');
    }
  };

  // Password login
  const submit=()=>{
    if(!hipaaAck){setError('You must acknowledge the HIPAA notice to continue.');return;}
    setLoading(true);setError('');
    setTimeout(()=>{
      if(isLockedOut(username)){
        const a=getAttempts(username);
        const remaining=Math.ceil((LOCKOUT_MS-(Date.now()-a.lastAt))/60000);
        setError(`Account locked. Try again in ${remaining} minute(s).`);
        auditLog('LOGIN_LOCKED',`Locked account access attempt: ${username}`,'system');
        setLoading(false);return;
      }
      const users=LS.get('ccs_users',[]);
      const user=users.find(u=>u.username===username);
      let authenticated=false;
      if(user){
        if(user.passwordHash){authenticated=verifyPassword(password,user.passwordHash,user.passwordSalt);}
        else{authenticated=(user.password===password);}
      }
      if(authenticated){
        // Offer to set up biometrics if available and not yet registered
        if(canBio&&!hasBiometric(username)){
          setPendingUser(user);setShowBioPrompt(true);setLoading(false);
        } else {
          finishLogin(user);
        }
      } else {
        const a=getAttempts(username);
        const newCount=a.count+1;
        setAttempts(username,newCount);
        const remaining=MAX_LOGIN_ATTEMPTS-newCount;
        auditLog('LOGIN_FAIL',`Failed login attempt for: ${username} (${newCount}/${MAX_LOGIN_ATTEMPTS})`);
        if(remaining<=0){setError('Too many failed attempts. Account locked for 15 minutes.');}
        else{setError(`Invalid credentials. ${remaining} attempt${remaining!==1?'s':''} remaining before lockout.`);}
        setLoading(false);
      }
    },500);
  };

  // Biometric setup prompt after password login
  if(showBioPrompt&&pendingUser){
    return h('div',{className:'login-wrap'},
      h('div',{className:'login-logo'},'CCS'),
      h('div',{className:'login-title'},'CCS Scheduler'),
      h('div',{className:'login-card'},
        h('div',{style:{textAlign:'center',marginBottom:20}},
          h('div',{style:{fontSize:56,marginBottom:8}},bioDone?'✅':'🫱'),
          h('div',{style:{fontWeight:800,fontSize:18,marginBottom:6}},bioDone?'Face ID Enabled!':'Enable Face ID?'),
          h('div',{style:{fontSize:13,color:'var(--text2)',lineHeight:1.6}},
            bioDone
              ?`You can now sign in instantly with your face or fingerprint.`
              :`Sign in faster next time using your face, fingerprint, or device PIN — no password needed.`
          )
        ),
        !bioDone&&h('div',null,
          h('button',{
            className:'btn btn-primary btn-block',
            style:{fontSize:15,padding:'14px',marginBottom:10},
            onClick:async()=>{
              try{
                await registerBiometric(pendingUser);
                setBioDone(true);
                auditLog('BIOMETRIC_REGISTER',`Face ID registered: ${pendingUser.username}`);
                setTimeout(()=>finishLogin(pendingUser),1500);
              }catch(e){
                if(e.name==='NotAllowedError'){setError('Setup cancelled.');}
                else{setError('Could not set up Face ID. Using password login.');}
                finishLogin(pendingUser);
              }
            }
          },'🫱 Set Up Face ID / Biometrics'),
          h('button',{className:'btn btn-ghost btn-block',onClick:()=>finishLogin(pendingUser)},'Skip — use password each time')
        ),
        bioDone&&h('div',{style:{textAlign:'center',color:'var(--green)',fontWeight:700,fontSize:14}},'Logging you in…'),
        error&&h('div',{className:'alert alert-red',style:{marginTop:10}},h(Icon,{name:'alert',size:16}),h('span',null,error))
      )
    );
  }

  return h('div',{className:'login-wrap'},
    // HIPAA Modal
    showHipaa&&h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:20}},
      h('div',{style:{background:'var(--bg2)',borderRadius:20,padding:24,maxWidth:400,width:'100%',border:'1px solid var(--border)'}},
        h('div',{style:{textAlign:'center',marginBottom:16}},
          h('div',{style:{fontSize:40,marginBottom:8}},'🔒'),
          h('div',{style:{fontWeight:800,fontSize:18,color:'var(--text)'}},APP_ID.replace(/_/g,' ')),
          h('div',{style:{fontSize:11,color:'var(--blue)',fontWeight:700,letterSpacing:1,marginTop:4}},'HIPAA PROTECTED SYSTEM')
        ),
        h('div',{style:{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:10,padding:14,fontSize:12,color:'var(--text2)',lineHeight:1.7,marginBottom:16}},
          h('strong',{style:{color:'var(--red)',display:'block',marginBottom:6}},'⚠ NOTICE: Confidential Health Information'),
          'This system contains Protected Health Information (PHI) subject to HIPAA of 1996. By logging in you confirm you are an authorized user and will only access information necessary for your job duties.',
          h('br'),h('br'),
          h('strong',null,'Unauthorized access is monitored, logged, and prosecutable under 45 CFR Parts 160 & 164.')
        ),
        h('div',{style:{display:'flex',alignItems:'flex-start',gap:10,marginBottom:16,cursor:'pointer'},onClick:()=>setHipaaAck(a=>!a)},
          h('div',{style:{width:20,height:20,borderRadius:4,border:`2px solid ${hipaaAck?'var(--green)':'var(--border)'}`,background:hipaaAck?'var(--green)':'transparent',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',marginTop:1}},
            hipaaAck&&h('span',{style:{color:'#fff',fontSize:13,fontWeight:900}},'✓')
          ),
          h('span',{style:{fontSize:12,color:'var(--text2)',lineHeight:1.5}},'I understand and agree. I am an authorized user of this system.')
        ),
        h('button',{className:'btn btn-primary btn-block',onClick:()=>{if(hipaaAck)setShowHipaa(false);else setError('Please check the box above.');},disabled:!hipaaAck},'Continue to Login')
      )
    ),

    h('div',{className:'login-logo'},'CCS'),
    h('div',{className:'login-title'},'CCS Scheduler'),
    h('div',{className:'login-sub'},'Community Connections Support · ILS'),
    h('div',{style:{display:'flex',gap:6,justifyContent:'center',marginBottom:16}},
      h('span',{className:'badge badge-green'},h(Icon,{name:'shield',size:11}),' AES-256 Encrypted'),
      h('span',{className:'badge badge-blue'},'HIPAA Compliant'),
      canBio&&h('span',{className:'badge badge-purple'},'🫱 Biometrics Ready')
    ),

    h('div',{className:'login-card'},
      // ── Biometric login section ──
      canBio&&h('div',null,
        (bioStatus==='scanning')&&h('div',{style:{textAlign:'center',padding:'24px 0'}},
          h('div',{style:{fontSize:60,marginBottom:8,animation:'pulse 1s infinite'}},'🫱'),
          h('div',{style:{fontWeight:700,fontSize:15,color:'var(--blue)'}},
            typeof window!=='undefined'&&/iPhone|iPad|Mac/i.test(navigator.userAgent)?'Looking for your face…':'Checking biometrics…'),
          h('div',{style:{fontSize:12,color:'var(--text3)',marginTop:4}},'Follow your device\'s prompt')
        ),
        (bioStatus==='success')&&h('div',{style:{textAlign:'center',padding:'20px 0'}},
          h('div',{style:{fontSize:56}},'✅'),
          h('div',{style:{fontWeight:700,color:'var(--green)',marginTop:6}},'Identity Confirmed!')
        ),
        (bioStatus==='')&&h('div',null,
          h('button',{
            className:'btn btn-primary btn-block',
            style:{fontSize:15,padding:'14px',background:'linear-gradient(135deg,#1e3a5f,#2563eb)',marginBottom:12},
            disabled:!hipaaAck||loading,
            onClick:doBioLogin
          },
            h('span',{style:{fontSize:20,marginRight:8}},'🫱'),
            /iPhone|iPad/i.test(navigator.userAgent||'')?'Sign in with Face ID':
            /Mac/i.test(navigator.userAgent||'')?'Sign in with Touch ID':
            /Android/i.test(navigator.userAgent||'')?'Sign in with Fingerprint':
            'Sign in with Biometrics'
          ),
          h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:12}},
            h('div',{style:{flex:1,height:1,background:'var(--border)'}}),

            h('div',{style:{flex:1,height:1,background:'var(--border)'}})

        )
      ),

      // ── Password login ──
      bioStatus===''&&h('div',null,

// Admin Today
const AdminToday=({participants,instructors,adjustments})=>{
  const[date,setDate]=useState(todayStr());
  const dow=dayOfWeek(date);

  const sessions=participants.filter(p=>p.active&&p.schedule&&p.schedule[dow]&&
    (['a','b'].some(s=>p.schedule[dow][s]&&p.schedule[dow][s].start)));

  const grouped={};
  sessions.forEach(p=>{
    const instr=p.assignedInstructor||'Unassigned';
    if(!grouped[instr])grouped[instr]=[];
    grouped[instr].push(p);
  });

  const todayAdj=adjustments.filter(a=>a.date===date);

  return h('div',{className:'fade-up'},
    h(DateStrip,{selected:date,onChange:setDate}),
    todayAdj.length>0&&h('div',{className:'alert alert-yellow',style:{marginBottom:12}},
      h(Icon,{name:'clock',size:16}),
      h('span',null,`${todayAdj.length} schedule adjustment${todayAdj.length>1?'s':''} today`)
    ),
    sessions.length===0?h('div',{className:'empty'},h('div',{className:'empty-icon'},'📅'),h('div',null,'No sessions scheduled for ',dow)):
    Object.entries(grouped).map(([instrId,pts])=>{
      const instr=instructors.find(i=>i.id===instrId);
      return h('div',{key:instrId,className:'card'},
        h('div',{className:'row',style:{marginBottom:10}},
          h('div',null,
            h('div',{style:{fontWeight:700}},instr?instr.name:'Unassigned'),
            h('span',{className:`badge badge-${instr?.agency==='ALTA'?'blue':'purple'}`},instr?.agency||'')
          ),
          h('span',{className:'badge badge-gray'},`${pts.length} client${pts.length>1?'s':''}`)
        ),
        pts.map(p=>{
          const sched=p.schedule[dow];
          const adj=todayAdj.find(a=>a.participantId===p.id);
          const hrs=hrsRemaining(p,adjustments);
          return h('div',{key:p.id,className:`session-card${adj?' adjusted':''}`,style:{marginBottom:8}},
            h('div',{className:'row'},
              h('div',null,
                h('div',{style:{fontWeight:600,fontSize:14}},`${p.firstName} ${p.lastName}`),
                h('div',{style:{fontSize:11,color:'var(--text3)'}},p.uci)
              ),
              h(HrChip,{hrs})
            ),
            h('div',{style:{marginTop:6,fontSize:12,color:'var(--text2)'}},
              sched.a&&sched.a.start&&h('span',null,`A: ${formatTime(sched.a.start)}–${formatTime(sched.a.end)} `),
              sched.b&&sched.b.start&&h('span',null,`B: ${formatTime(sched.b.start)}–${formatTime(sched.b.end)}`)
            ),
            adj&&h('div',{className:'badge badge-yellow',style:{marginTop:6}},
              h(Icon,{name:'clock',size:10}),' Adjusted: ',formatTime(adj.adjStart),'–',formatTime(adj.adjEnd),' (-',adj.minsLost,'min)')
          );
        })
      );
    })
  );
};

// Admin Alerts
const AdminAlerts=({participants,instructors,adjustments,notifications,events})=>{
  const today=todayStr();
  const ym=ymStr();
  const alerts=[];

  // POS expiring
  participants.filter(p=>p.active).forEach(p=>{
    if(!p.posStart)return;
    const pos=new Date(p.posStart+'T12:00:00');
    const exp=new Date(pos);exp.setFullYear(exp.getFullYear()+1);
    const daysLeft=Math.floor((exp-new Date())/86400000);
    if(daysLeft<0)alerts.push({id:'pos-'+p.id,level:'red',title:'POS Expired',msg:`${p.firstName} ${p.lastName} — POS expired ${-daysLeft}d ago`,ts:today});
    else if(daysLeft<30)alerts.push({id:'posx-'+p.id,level:'yellow',title:'POS Expiring Soon',msg:`${p.firstName} ${p.lastName} — ${daysLeft}d remaining`,ts:today});
  });

  // Hours warnings
  participants.filter(p=>p.active).forEach(p=>{
    const hrs=hrsRemaining(p,adjustments);
    if(hrs<=0)alerts.push({id:'hrs0-'+p.id,level:'red',title:'Hours Exhausted',msg:`${p.firstName} ${p.lastName} — no hours remaining this month`,ts:today});
    else if(hrs<=HOUR_WARN)alerts.push({id:'hrs-'+p.id,level:'yellow',title:'Low Hours',msg:`${p.firstName} ${p.lastName} — ${hrs.toFixed(1)}h left`,ts:today});
  });

  // Late adjustments today
  const todayAdj=adjustments.filter(a=>a.date===today&&a.minsLost>=LATE_CHANGE_MIN);
  todayAdj.forEach(a=>alerts.push({id:'adj-'+a.id,level:'orange',title:'Schedule Adjustment',msg:`${a.participantName} — ${a.minsLost}min lost (${a.instrName})`,ts:today}));

  // Pending notifications
  const pending=notifications.filter(n=>!n.resolved);
  pending.forEach(n=>alerts.push({id:'notif-'+n.id,level:'blue',title:n.type||'Notification',msg:n.message||n.details,ts:n.ts}));

  // Upcoming events
  const upcoming=events.filter(e=>{const d=new Date(e.date);const now=new Date();const diff=(d-now)/86400000;return diff>=0&&diff<=7;});
  upcoming.forEach(e=>alerts.push({id:'ev-'+e.id,level:'teal',title:'Upcoming Event',msg:`${e.title} — ${formatDate(e.date)}`,ts:e.date}));

  const colorMap={red:'alert-red',yellow:'alert-yellow',orange:'alert-yellow',blue:'alert-blue',teal:'alert-green'};

  return h('div',{className:'fade-up'},
    alerts.length===0?h('div',{className:'empty'},h('div',{className:'empty-icon'},'✅'),h('div',null,'No active alerts')):
    alerts.map(a=>h('div',{key:a.id,className:`alert ${colorMap[a.level]||'alert-blue'}`},
      h(Icon,{name:a.level==='red'?'alert':a.level==='teal'?'calendar':'bell',size:16}),
      h('div',null,h('div',{style:{fontWeight:700,fontSize:13}},a.title),h('div',{style:{fontSize:12,marginTop:2}},a.msg))
    ))
  );
};

// Admin Assign
const AdminAssign=({participants,instructors,adjustments,onUpdate})=>{
  const[results,setResults]=useState(null);
  const[running,setRunning]=useState(false);
  const[preview,setPreview]=useState(null);

  const actInstr=instructors.filter(i=>i.role==='Instructor'&&i.active);
  const actParts=participants.filter(p=>p.active);

  const autoAssign=()=>{
    setRunning(true);
    setTimeout(()=>{
      const assignments={};
      const log={};
      const instrLoad={};
      actInstr.forEach(i=>{instrLoad[i.id]=0;});

      // Sort by most-constrained
      const sorted=[...actParts].sort((a,b)=>{
        const ea=actInstr.filter(i=>scoreInstructor(i,a,instrLoad)>0).length;
        const eb=actInstr.filter(i=>scoreInstructor(i,b,instrLoad)>0).length;
        return ea-eb;
      });

      sorted.forEach(p=>{
        const scores=actInstr.map(i=>({i,score:scoreInstructor(i,p,instrLoad)})).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
        if(scores.length>0){
          const winner=scores[0].i;
          assignments[p.id]=winner.id;
          log[p.id]={score:scores[0].score,instrName:winner.name,candidates:scores.length};
          instrLoad[winner.id]+=(p.maxHrsWeek||20)*60;
        } else {
          log[p.id]={score:0,instrName:null,candidates:0,disqualified:true};
        }
      });
      setResults({assignments,log});
      setRunning(false);
    },600);
  };

  const scoreInstructor=(instr,p,load)=>{
    if(!p.schedule)return 0;
    let score=0;
    const schedDays=DAYS.filter(d=>p.schedule[d]&&(p.schedule[d].a?.start||p.schedule[d].b?.start));
    // Availability check (30pts)
    const avail=instr.availability||{};
    let availOk=true;
    schedDays.forEach(d=>{
      const blocks=avail[d]||[];
      const sessionStart=p.schedule[d]?.a?.start||p.schedule[d]?.b?.start;
      if(!sessionStart){return;}
      const sm=parseTime(sessionStart);
      const inBlock=blocks.some(b=>{
        const[bs,be]=b.split('-');
        const bsm=parseTime(bs.replace('am','').replace('pm',m=>parseInt(bs)<12?':00':(parseInt(bs)+12)+':00').replace(/(\d+)(am|pm)/,(_,h,ap)=>ap==='am'?`${h}:00`:`${parseInt(h)<12?parseInt(h)+12:h}:00`));
        const bem=bsm+240;
        return sm>=bsm&&sm<bem;
      });
      if(!inBlock)availOk=false;
    });
    if(!availOk)return 0;
    score+=30;
    // No conflict (25pts) — simplified
    score+=25;
    // Proximity (30pts)
    const instrCity=(instr.address||'').split(',')[0].toLowerCase();
    const pCity=(p.locations&&p.locations[0]?.address||'').split(',')[0].toLowerCase();
    if(instrCity&&pCity){
      if(instrCity===pCity)score+=30;
      else score+=15;
    } else score+=15;
    // Workload (15pts)
    const maxLoad=Math.max(...Object.values(load),1);
    const myLoad=load[instr.id]||0;
    score+=Math.round((1-myLoad/maxLoad)*15);
    return score;
  };

  const applyAssign=()=>{
    if(!results)return;
    const updated=participants.map(p=>results.assignments[p.id]?{...p,assignedInstructor:results.assignments[p.id]}:p);
    LS.set('ccs_participants',updated);
    onUpdate('participants',updated);
    setResults(null);
    alert('Assignments applied!');
  };

  return h('div',{className:'fade-up'},
    h('div',{className:'card'},
      h('div',{style:{fontWeight:700,fontSize:15,marginBottom:6}},'Auto-Assign'),
      h('div',{style:{fontSize:12,color:'var(--text2)',marginBottom:14}},'Scores instructors on availability (30pts), conflicts (25pts), proximity (30pts), and workload (15pts). Most-constrained participants assigned first.'),
      h('button',{className:'btn btn-primary btn-block',onClick:autoAssign,disabled:running},running?'Running…':`Run Auto-Assign (${actParts.length} clients)`)
    ),
    results&&h('div',null,
      h('div',{className:'section-title'},'Preview Results'),
      actParts.map(p=>{
        const r=results.log[p.id];
        return h('div',{key:p.id,className:'card-sm'},
          h('div',{className:'row'},
            h('div',{style:{fontWeight:600,fontSize:13}},`${p.firstName} ${p.lastName}`),
            r?.disqualified?h('span',{className:'badge badge-red'},'No match'):h('span',{className:'badge badge-green'},r?.instrName||'?')
          ),
          !r?.disqualified&&h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:2}},`Score: ${r?.score}/100 · ${r?.candidates} candidate(s)`)
        );
      }),
      h('div',{style:{display:'flex',gap:8,marginTop:12}},
        h('button',{className:'btn btn-ghost',style:{flex:1},onClick:()=>setResults(null)},'Discard'),
        h('button',{className:'btn btn-success',style:{flex:2},onClick:applyAssign},'Apply Assignments')
      )
    ),
    h('hr',{className:'divider'}),
    h('div',{className:'section-title'},'Manual Override'),
    actParts.map(p=>{
      const actInstrList=instructors.filter(i=>i.role==='Instructor'&&i.active);
      return h('div',{key:p.id,className:'card-sm'},
        h('div',{style:{fontWeight:600,fontSize:13,marginBottom:6}},`${p.firstName} ${p.lastName}`),
        h('select',{className:'form-select',value:p.assignedInstructor||'',onChange:e=>{
          const updated=participants.map(x=>x.id===p.id?{...x,assignedInstructor:e.target.value}:x);
          LS.set('ccs_participants',updated);onUpdate('participants',updated);
        }},
          h('option',{value:''},'-- Unassigned --'),
          actInstrList.map(i=>h('option',{key:i.id,value:i.id},i.name))
        )
      );
    })
  );
};

const SupGeoFence=({participants})=>{
  const[loc,setLoc]=useState(null);
  const[loading,setLoading]=useState(false);
  const[nearby,setNearby]=useState([]);
  const[error,setError]=useState('');

  const dist=(lat1,lon1,lat2,lon2)=>{
    const R=6371000;const dLat=(lat2-lat1)*Math.PI/180;const dLon=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  };

  const check=()=>{
    setLoading(true);setError('');
    navigator.geolocation.getCurrentPosition(pos=>{
      const{latitude,longitude}=pos.coords;
      setLoc({latitude,longitude});
      const found=[];
      participants.forEach(p=>(p.locations||[]).forEach(loc=>{
        if(loc.lat&&loc.lng){
          const d=dist(latitude,longitude,loc.lat,loc.lng);
          if(d<=FENCE_M)found.push({participant:p,location:loc,distance:Math.round(d)});
        }
      }));
      setNearby(found);setLoading(false);
    },err=>{setError('Location access denied. Enable GPS to use GeoFence.');setLoading(false);});
  };

  return h('div',{className:'fade-up'},
    h('div',{className:'card',style:{textAlign:'center',marginBottom:16}},
      h('div',{style:{fontSize:40,marginBottom:8}},'📍'),
      h('div',{style:{fontWeight:700,marginBottom:4}},'GeoFence Check'),
      h('div',{style:{fontSize:12,color:'var(--text2)',marginBottom:14}},`Detects participants within ${FENCE_M}m of your location`),
      h('button',{className:'btn btn-primary btn-block',onClick:check,disabled:loading},loading?'Getting location…':h('span',null,h(Icon,{name:'location',size:14}),' Check My Location'))
    ),
    error&&h('div',{className:'alert alert-red'},h(Icon,{name:'alert',size:16}),error),
    loc&&h('div',{className:'alert alert-blue'},h(Icon,{name:'location',size:16}),`${loc.latitude.toFixed(4)}, ${loc.longitude.toFixed(4)}`),
    nearby.length>0&&h('div',null,
      h('div',{className:'section-title'},`Nearby Participants (${nearby.length})`),
      nearby.map((n,i)=>h('div',{key:i,className:'card-sm'},
        h('div',{style:{fontWeight:600}},`${n.participant.firstName} ${n.participant.lastName}`),
        h('div',{style:{fontSize:12,color:'var(--text2)',marginTop:2}},h(Icon,{name:'location',size:12}),' ',n.location.label,' — ',n.location.address),
        h('span',{className:'badge badge-green',style:{marginTop:4}},`${n.distance}m away`)
      ))
    ),
    loc&&nearby.length===0&&h('div',{className:'alert alert-green'},h(Icon,{name:'check',size:16}),'No participants within ',FENCE_M,'m')
  );
};

const PartSchedule=({currentUser,participants,onUpdate})=>{
  const p=participants.find(x=>x.id===currentUser.participantId)||participants[0];
  if(!p)return null;
  const[openDay,setOpenDay]=useState(null);
  const[showFavForm,setShowFavForm]=useState(null);
  const[favReason,setFavReason]=useState('');
  const[favNote,setFavNote]=useState('');
  const favorites=p.favoriteLocations||[];

  const FAV_REASONS=['I felt safe here','Great community activity','Fun and enjoyable','Good food','Helps with my goals','I made friends here','Easy to get to','I want to go back','Other'];

  const saveFavorite=()=>{
    if(!showFavForm||!favReason)return;
    const fav={id:uid(),locationId:showFavForm.id,locationLabel:showFavForm.label,address:showFavForm.address,reason:favReason,note:favNote,date:todayStr(),participantId:p.id,participantName:`${p.firstName} ${p.lastName}`};
    const updated={...p,favoriteLocations:[...favorites,fav]};
    const all=participants.map(x=>x.id===p.id?updated:x);
    LS.set('ccs_participants',all);
    onUpdate('participants',all);
    setShowFavForm(null);setFavReason('');setFavNote('');
  };

  const removeFavorite=(favId)=>{
    const updated={...p,favoriteLocations:favorites.filter(f=>f.id!==favId)};
    const all=participants.map(x=>x.id===p.id?updated:x);
    LS.set('ccs_participants',all);
    onUpdate('participants',all);
  };

  return h('div',{className:'fade-up'},
    h('div',{style:{background:'rgba(59,130,246,0.1)',border:'1px solid rgba(59,130,246,0.2)',borderRadius:10,padding:'10px 14px',marginBottom:14,display:'flex',gap:8,alignItems:'center'}},
      h('span',{style:{fontSize:18}},'👆'),

const AdminSecurity=({users,onUpdate})=>{
  const[tab,setTab]=useState('dashboard');
  const[audit,setAudit]=useState(()=>LS.get('ccs_audit',[]));
  const[showChangePwd,setShowChangePwd]=useState(null);
  const[pwdForm,setPwdForm]=useState({current:'',newPwd:'',confirm:''});
  const[pwdError,setPwdError]=useState('');
  const[pwdSuccess,setPwdSuccess]=useState('');

  const refreshAudit=()=>setAudit(LS.get('ccs_audit',[]));

  const pwdStrength=(p)=>{
    let score=0;
    if(p.length>=8)score++;if(p.length>=12)score++;
    if(/[A-Z]/.test(p))score++;if(/[0-9]/.test(p))score++;if(/[^A-Za-z0-9]/.test(p))score++;
    return score;
  };
  const pwdLabel=['','Weak','Fair','Good','Strong','Very Strong'];
  const pwdColor=['','var(--red)','var(--orange)','var(--yellow)','var(--green)','var(--teal)'];

  const changePassword=(targetUser)=>{
    setPwdError('');setPwdSuccess('');
    const u=users.find(x=>x.id===targetUser.id);
    // Verify current
    let currentOk=false;
    if(u.passwordHash){currentOk=verifyPassword(pwdForm.current,u.passwordHash,u.passwordSalt);}
    else{currentOk=(u.password===pwdForm.current);}
    if(!currentOk){setPwdError('Current password is incorrect.');return;}
    if(pwdForm.newPwd!==pwdForm.confirm){setPwdError('New passwords do not match.');return;}
    if(pwdStrength(pwdForm.newPwd)<3){setPwdError('Password is too weak. Use 8+ characters with uppercase, numbers, and symbols.');return;}
    const{hash,salt}=hashPassword(pwdForm.newPwd);
    const updated=users.map(x=>x.id===u.id?{...x,passwordHash:hash,passwordSalt:salt,password:undefined,lastPwdChange:new Date().toISOString()}:x);
    LS.set('ccs_users',updated);onUpdate('users',updated);
    auditLog('PASSWORD_CHANGE',`Password changed for user: ${u.username}`);
    setPwdSuccess('Password updated successfully.');
    setPwdForm({current:'',newPwd:'',confirm:''});
    setTimeout(()=>{setShowChangePwd(null);setPwdSuccess('');},2000);
  };

  const exportAudit=()=>{
    const rows=audit.map(a=>({Timestamp:a.ts,User:a.user,Action:a.action,Detail:a.detail}));
    const ws=XLSX.utils.json_to_sheet(rows);
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Audit Log');
    XLSX.writeFile(wb,`ccs-audit-${new Date().toISOString().slice(0,10)}.xlsx`);
    auditLog('AUDIT_EXPORT','Audit log exported to XLSX');
  };

  const actionColor=(a)=>{
    if(a.includes('FAIL')||a.includes('LOCK'))return 'var(--red)';
    if(a.includes('LOGIN'))return 'var(--green)';
    if(a.includes('DELETE'))return 'var(--orange)';
    if(a.includes('EXPORT'))return 'var(--purple)';

          '• Password hashing: PBKDF2-SHA256 / 10,000 iterations',h('br'),

    ),

    tab==='passwords'&&h('div',null,
      h('div',{className:'alert alert-blue',style:{marginBottom:14}},h(Icon,{name:'shield',size:16}),h('div',null,h('div',{style:{fontWeight:700}},'Password Policy'),h('div',{style:{fontSize:11,marginTop:2}},'Min 8 chars · uppercase · number · symbol · 15-min lockout after 5 failures'))),
      users.map(u=>h('div',{key:u.id,className:'card-sm'},
        h('div',{className:'row'},
          h('div',null,

            h('div',{style:{fontSize:11,color:'var(--text3)'}},u.username,' · ',h('span',{className:`badge badge-${u.passwordHash?'green':'yellow'}`,style:{fontSize:9}},u.passwordHash?'🔒 Hashed':'⚠ Plain')),
            u.lastPwdChange&&h('div',{style:{fontSize:10,color:'var(--text3)',marginTop:2}},'Changed: ',new Date(u.lastPwdChange).toLocaleDateString())
          ),
          h('button',{className:'btn btn-ghost btn-sm',onClick:()=>{setShowChangePwd(u);setPwdForm({current:'',newPwd:'',confirm:''});setPwdError('');setPwdSuccess('');}},h(Icon,{name:'edit',size:13}),' Change')
        )

      showChangePwd&&h(Modal,{open:true,onClose:()=>setShowChangePwd(null),title:`Change Password: ${showChangePwd.name}`},

            Array.from({length:5},(_,i)=>h('div',{key:i,style:{flex:1,height:3,borderRadius:2,background:i<pwdStrength(pwdForm.newPwd)?pwdColor[pwdStrength(pwdForm.newPwd)]:'var(--bg3)',transition:'background 0.2s'}})),

        pwdSuccess&&h('div',{className:'alert alert-green',style:{marginBottom:8}},h(Icon,{name:'check',size:14}),pwdSuccess),

      ),

// ─── Desired Locations (City/Zip search with Google Maps) ───
const DesiredLocations=({p,participants,onUpdate,housing})=>{
  const[input,setInput]=useState('');
  const saved=housing.desiredLocations||[];

  const addLocation=()=>{
    const val=input.trim();
    if(!val)return;
    if(saved.some(s=>s.displayName.toLowerCase()===val.toLowerCase()))return;
    const loc={displayName:val,mapsUrl:`https://www.google.com/maps/search/${encodeURIComponent(val+', CA')}`};
    const updated={...p,housing:{...housing,desiredLocations:[...saved,loc]}};
    const all=participants.map(x=>x.id===p.id?updated:x);
    LS.set('ccs_participants',all);onUpdate('participants',all);
    setInput('');
  };

  const removeLocation=(displayName)=>{
    const updated={...p,housing:{...housing,desiredLocations:saved.filter(s=>s.displayName!==displayName)}};
    const all=participants.map(x=>x.id===p.id?updated:x);
    LS.set('ccs_participants',all);onUpdate('participants',all);
  };

  return h('div',{className:'card',style:{marginBottom:12}},
    h('div',{style:{fontWeight:800,fontSize:15,marginBottom:4}},'🗺️ Cities & Towns I Want to Live In'),
    h('div',{style:{fontSize:12,color:'var(--text3)',marginBottom:14}},'Type a city, town, or zip code and tap Add. Each one will have a Google Maps link.'),

    // Input row
    h('div',{style:{display:'flex',gap:8,marginBottom:14}},
      h('input',{
        className:'form-input',
        value:input,
        onChange:e=>setInput(e.target.value),
        onKeyDown:e=>e.key==='Enter'&&addLocation(),
        placeholder:'e.g. Elk Grove, 95758, Modesto…',
        style:{flex:1,fontSize:14}
      }),
      h('button',{
        className:'btn btn-primary',
        onClick:addLocation,
        disabled:!input.trim(),
        style:{flexShrink:0,padding:'10px 16px',fontWeight:700}
      },'+ Add')
    ),

    // Saved locations list
    saved.length===0
      ?h('div',{style:{textAlign:'center',padding:'20px 0',color:'var(--text3)',fontSize:13,background:'var(--bg3)',borderRadius:10}},
          h('div',{style:{fontSize:32,marginBottom:6}},'🗺️'),
          'No locations added yet'
        )
      :h('div',null,
          h('div',{style:{fontSize:11,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:0.6,marginBottom:8}},saved.length,' location'+(saved.length!==1?'s':'')+' saved'),
          saved.map((loc,i)=>h('div',{key:i,style:{
            display:'flex',alignItems:'center',justifyContent:'space-between',
            padding:'13px 14px',
            background:'rgba(59,130,246,0.06)',
            border:'1px solid rgba(59,130,246,0.18)',
            borderRadius:12,
            marginBottom:8
          }},
            h('div',{style:{display:'flex',alignItems:'center',gap:12}},
              h('div',{style:{width:38,height:38,borderRadius:10,background:'rgba(59,130,246,0.15)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:18}},'📍'),
              h('div',null,
                h('div',{style:{fontWeight:700,fontSize:14,marginBottom:4}},loc.displayName),
                h('a',{
                  href:loc.mapsUrl,
                  target:'_blank',
                  rel:'noopener',
                  style:{fontSize:12,color:'var(--blue)',textDecoration:'none',display:'inline-flex',alignItems:'center',gap:4,padding:'3px 8px',background:'rgba(59,130,246,0.1)',borderRadius:6,fontWeight:600}
                },'🗺 Open in Google Maps ↗')
              )
            ),
            h('button',{
              onClick:()=>removeLocation(loc.displayName),
              style:{background:'none',border:'none',cursor:'pointer',color:'var(--text3)',padding:'6px 8px',fontSize:18,lineHeight:1,borderRadius:8,flexShrink:0},
              title:'Remove'
            },'✕')
          ))
        )
  );
};

// ─── PARTICIPANT HOUSING ───
const PartHousing=({currentUser,participants,onUpdate})=>{
  const p=participants.find(x=>x.id===currentUser.participantId)||participants[0];
  if(!p)return null;

  const[tab,setTab]=useState('checklist');
  const housing=p.housing||{};
  const checkedItems=housing.checkedItems||{};
  const prefs=housing.prefs||{};

  const saveChecked=(key,val)=>{
    const updated={...p,housing:{...housing,checkedItems:{...checkedItems,[key]:val}}};
    const all=participants.map(x=>x.id===p.id?updated:x);
    LS.set('ccs_participants',all);onUpdate('participants',all);
  };
  const savePref=(key,val)=>{
    const updated={...p,housing:{...housing,prefs:{...prefs,[key]:val}}};
    const all=participants.map(x=>x.id===p.id?updated:x);
    LS.set('ccs_participants',all);onUpdate('participants',all);
  };

  // ── Checklist data ──
  const checklistSections=[
    {
      emoji:'💰',title:'Money & Budget',color:'var(--green)',
      items:[
        {id:'budget1',text:'I know how much money I get each month (SSI, SSDI, paycheck)'},
        {id:'budget2',text:'I know how much rent I can afford (usually no more than 1/3 of my income)'},
        {id:'budget3',text:'I have a savings account'},
        {id:'budget4',text:'I have saved at least 1–2 months of rent for a deposit'},
        {id:'budget5',text:'I know how to pay bills (electricity, internet, phone)'},
        {id:'budget6',text:'I have a monthly budget plan'},
      ]
    },
    {
      emoji:'📄',title:'Paperwork & IDs',color:'var(--blue)',
      items:[
        {id:'paper1',text:'I have a government photo ID (driver\'s license or state ID)'},
        {id:'paper2',text:'I have my Social Security card'},
        {id:'paper3',text:'I have my birth certificate'},
        {id:'paper4',text:'I have proof of income (letter from SSA or pay stubs)'},
        {id:'paper5',text:'I have references (people who can say good things about me)'},
        {id:'paper6',text:'I know my credit score or am working to build credit'},
      ]
    },
    {
      emoji:'🏠',title:'Finding a Place',color:'var(--purple)',
      items:[
        {id:'find1',text:'I have searched online listings (Craigslist, Zillow, Facebook Marketplace)'},
        {id:'find2',text:'I have asked my caseworker or regional center about housing help'},
        {id:'find3',text:'I know about Section 8 / HUD housing vouchers'},
        {id:'find4',text:'I have visited at least one place in person'},
        {id:'find5',text:'I have read a rental agreement or lease before'},
        {id:'find6',text:'I know I can ask someone I trust to help me read a lease'},
        {id:'find7',text:'I know what to look for when touring an apartment (safety, cleanliness, locks)'},
      ]
    },
    {
      emoji:'🛒',title:'Moving In',color:'var(--orange)',
      items:[
        {id:'move1',text:'I know how to set up electricity and internet in my name'},
        {id:'move2',text:'I know what basic furniture and supplies I need'},
        {id:'move3',text:'I know how to do laundry'},
        {id:'move4',text:'I know how to keep my home clean and organized'},
        {id:'move5',text:'I know how to cook basic meals for myself'},
        {id:'move6',text:'I know what to do in an emergency (fire, medical)'},
        {id:'move7',text:'I have a support person I can call if I need help at home'},
      ]
    },
    {
      emoji:'🤝',title:'Living with Others (If Applicable)',color:'var(--teal)',
      items:[
        {id:'room1',text:'I know how to talk about house rules with roommates'},
        {id:'room2',text:'I know how to split bills fairly'},
        {id:'room3',text:'I know how to handle disagreements calmly'},
        {id:'room4',text:'I understand what a roommate agreement is'},
        {id:'room5',text:'I know I can say no to living with someone who makes me uncomfortable'},
      ]
    },
    {
      emoji:'🔑',title:'My Rights as a Renter',color:'var(--yellow)',
      items:[
        {id:'rights1',text:'I know my landlord must give notice before entering my home'},
        {id:'rights2',text:'I know I can ask for repairs in writing'},
        {id:'rights3',text:'I know what to do if I feel unsafe where I live'},
        {id:'rights4',text:'I know I have disability rights (reasonable accommodations)'},
        {id:'rights5',text:'I know who to call if I have a problem with my landlord'},
      ]
    },
  ];

  const totalItems=checklistSections.reduce((s,sec)=>s+sec.items.length,0);
  const doneCount=Object.values(checkedItems).filter(Boolean).length;
  const pct=totalItems>0?Math.round((doneCount/totalItems)*100):0;

  // ── Preferences data ──
  const housingTypes=[
    {id:'ht_own',emoji:'🏠',label:'My Own Apartment'},
    {id:'ht_room',emoji:'🚪',label:'Rent a Room in a House'},
    {id:'ht_roommates',emoji:'👥',label:'Apartment with Roommates'},
    {id:'ht_board',emoji:'🏡',label:'Board & Care Home'},
    {id:'ht_family',emoji:'👨‍👩‍👧',label:'Stay with Family (Longer Term)'},
  ];

  const roommateCount=[
    {id:'rc_0',label:'No Roommates — I want to live alone'},
    {id:'rc_1',label:'1 Roommate'},
    {id:'rc_2',label:'2 Roommates'},
    {id:'rc_3',label:'3 Roommates'},
    {id:'rc_4',label:'4–5 Roommates'},
  ];

  const roommatePrefs=[
    {id:'rp_nosmoking',emoji:'🚭',label:'Non-Smoking'},
    {id:'rp_smoking',emoji:'🚬',label:'Smoking OK'},
    {id:'rp_nopets',emoji:'🐾',label:'No Pets'},
    {id:'rp_petsok',emoji:'🐶',label:'Pets OK'},
    {id:'rp_quiet',emoji:'🤫',label:'Quiet Household'},
    {id:'rp_social',emoji:'🎉',label:'Social / Active Household'},
    {id:'rp_samegender',emoji:'🚹',label:'Same Gender Preferred'},
    {id:'rp_anygender',emoji:'🧑',label:'Any Gender OK'},
    {id:'rp_sober',emoji:'🚫',label:'Sober / No Alcohol'},
    {id:'rp_clean',emoji:'🧹',label:'Very Clean / Organized'},
    {id:'rp_schedule',emoji:'📅',label:'Similar Daily Schedule'},
    {id:'rp_disability',emoji:'♿',label:'OK with Disabilities'},
  ];

  const locationPrefs=[
    {id:'lp_bus',emoji:'🚌',label:'Near Bus/Transit'},
    {id:'lp_work',emoji:'💼',label:'Near Work or Day Program'},
    {id:'lp_grocery',emoji:'🛒',label:'Near Grocery Store'},
    {id:'lp_quiet',emoji:'🌳',label:'Quiet Neighborhood'},
    {id:'lp_downtown',emoji:'🏙️',label:'Close to Downtown'},
    {id:'lp_family',emoji:'👨‍👩‍👧',label:'Near Family'},
    {id:'lp_onestory',emoji:'🏠',label:'Ground Floor / No Stairs'},
    {id:'lp_accessible',emoji:'♿',label:'Wheelchair Accessible'},
  ];

  const CheckItem=({id,text})=>{
    const done=!!checkedItems[id];
    return h('div',{
      onClick:()=>saveChecked(id,!done),
      style:{display:'flex',gap:12,alignItems:'flex-start',padding:'11px 12px',borderRadius:10,cursor:'pointer',background:done?'rgba(34,197,94,0.08)':'var(--bg3)',border:`1px solid ${done?'rgba(34,197,94,0.3)':'transparent'}`,marginBottom:6,transition:'all 0.15s',userSelect:'none'}
    },
      h('div',{style:{width:24,height:24,borderRadius:6,border:`2px solid ${done?'var(--green)':'var(--text3)'}`,background:done?'var(--green)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1,transition:'all 0.15s'}},
        done&&h('span',{style:{color:'#fff',fontSize:14,fontWeight:900,lineHeight:1}},'✓')
      ),
      h('span',{style:{fontSize:13,lineHeight:1.5,color:done?'var(--text2)':'var(--text)',textDecoration:done?'line-through':'none'}},text)

    onClick:()=>onToggle(id,!selected),

  },emoji&&h('span',null,emoji,' '),label,selected&&h('span',{style:{marginLeft:4,fontSize:12}},'✓'));

  return h('div',{className:'fade-up'},
    // Header
    h('div',{style:{background:'linear-gradient(135deg,#1a2e4a,#2563eb)',borderRadius:16,padding:20,marginBottom:16,textAlign:'center'}},
      h('div',{style:{fontSize:40,marginBottom:6}},'🏠'),
      h('div',{style:{fontWeight:800,fontSize:20,color:'#fff'}},'My Housing Journey'),
      h('div',{style:{fontSize:12,color:'rgba(255,255,255,0.75)',marginTop:4,lineHeight:1.5}},'Getting your own place is a big step. Let\'s get you ready!')
    ),

    // Sub-tabs
    h('div',{style:{display:'flex',gap:0,marginBottom:16,background:'var(--bg2)',borderRadius:12,padding:4,border:'1px solid var(--border)'}},
      [['checklist','✅ My Checklist'],['prefs','🎯 My Preferences']].map(([t,label])=>
        h('button',{key:t,onClick:()=>setTab(t),style:{flex:1,padding:'10px 8px',borderRadius:10,border:'none',cursor:'pointer',fontWeight:700,fontSize:13,background:tab===t?'var(--blue)':'transparent',color:tab===t?'#fff':'var(--text3)',transition:'all 0.15s'}},label)
      )
    ),

    // ── CHECKLIST TAB ──
    tab==='checklist'&&h('div',null,
      // Progress bar
      h('div',{className:'card',style:{marginBottom:16}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
          h('div',{style:{fontWeight:700,fontSize:14}},'Your Progress'),
          h('div',{style:{fontWeight:800,fontSize:20,color:pct>=80?'var(--green)':pct>=40?'var(--yellow)':'var(--blue)'}},`${pct}%`)

        ),
        h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:6}},`${doneCount} of ${totalItems} steps completed`)

            h('span',{style:{fontSize:24}}),
            h('div',{style:{fontWeight:800,fontSize:15,color:sec.color}},sec.emoji,' ',sec.title)
          ),

      // Housing type

        h('div',{style:{fontSize:12,color:'var(--text3)',marginBottom:12}},'Pick all that sound good to you'),
        h('div',{style:{display:'flex',flexWrap:'wrap'}},
          housingTypes.map(ht=>h(TogglePill,{key:ht.id,id:ht.id,emoji:ht.emoji,label:ht.label,selected:!!(prefs[ht.id]),onToggle:(id,val)=>savePref(id,val)}))

        roommateCount.map(rc=>h('div',{
          key:rc.id,
          onClick:()=>{

            const newPrefs={...prefs};
            roommateCount.forEach(x=>{newPrefs[x.id]=false;});
            newPrefs[rc.id]=true;
            const updated={...p,housing:{...housing,prefs:newPrefs}};
            const all=participants.map(x=>x.id===p.id?updated:x);
            LS.set('ccs_participants',all);onUpdate('participants',all);
          },
          style:{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',borderRadius:10,cursor:'pointer',border:`2px solid ${prefs[rc.id]?'var(--blue)':'var(--border)'}`,background:prefs[rc.id]?'rgba(59,130,246,0.08)':'var(--bg3)',marginBottom:8,transition:'all 0.15s',userSelect:'none'}
        },
          h('div',{style:{width:20,height:20,borderRadius:'50%',border:`2px solid ${prefs[rc.id]?'var(--blue)':'var(--text3)'}`,background:prefs[rc.id]?'var(--blue)':'transparent',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}},
            prefs[rc.id]&&h('div',{style:{width:8,height:8,borderRadius:'50%',background:'#fff'}})
          ),
          h('span',{style:{fontSize:13,fontWeight:prefs[rc.id]?700:400,color:prefs[rc.id]?'var(--blue)':'var(--text)'}},rc.label)
        ))
      ),
      // Roommate preferences
      h('div',{className:'card',style:{marginBottom:12}},
        h('div',{style:{fontWeight:800,fontSize:15,marginBottom:4}},'✅ What do I want in a roommate?'),
        h('div',{style:{fontSize:12,color:'var(--text3)',marginBottom:12}},'Pick everything that matters to you'),
        h('div',{style:{display:'flex',flexWrap:'wrap'}},
          roommatePrefs.map(rp=>h(TogglePill,{key:rp.id,id:rp.id,emoji:rp.emoji,label:rp.label,selected:!!(prefs[rp.id]),onToggle:(id,val)=>savePref(id,val)}))
        )
      ),
      // Location preferences
      h('div',{className:'card',style:{marginBottom:12}},
        h('div',{style:{fontWeight:800,fontSize:15,marginBottom:4}},'📍 Where do I want to live?'),
        h('div',{style:{fontSize:12,color:'var(--text3)',marginBottom:12}},'Pick everything that\'s important to you'),
        h('div',{style:{display:'flex',flexWrap:'wrap'}},
          locationPrefs.map(lp=>h(TogglePill,{key:lp.id,id:lp.id,emoji:lp.emoji,label:lp.label,selected:!!(prefs[lp.id]),onToggle:(id,val)=>savePref(id,val)}))
        )
      ),
      // Desired cities/towns/zip codes
      h(DesiredLocations,{p,participants,onUpdate,housing,prefs}),
      // Summary
      (Object.values(prefs).some(Boolean)||(housing.desiredLocations||[]).length>0)&&h('div',{style:{background:'rgba(34,197,94,0.08)',border:'1px solid rgba(34,197,94,0.2)',borderRadius:12,padding:16,marginBottom:12}},
        h('div',{style:{fontWeight:700,fontSize:14,marginBottom:8,color:'var(--green)'}},'💚 My Housing Wish List'),
        housingTypes.filter(x=>prefs[x.id]).length>0&&h('div',{style:{marginBottom:8}},
          h('div',{style:{fontSize:11,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:0.5,marginBottom:4}},'Housing Type'),
          housingTypes.filter(x=>prefs[x.id]).map(x=>h('span',{key:x.id,className:'chip',style:{marginRight:4}},x.emoji,' ',x.label))
        ),
        roommateCount.filter(x=>prefs[x.id]).length>0&&h('div',{style:{marginBottom:8}},
          h('div',{style:{fontSize:11,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:0.5,marginBottom:4}},'Roommates'),
          roommateCount.filter(x=>prefs[x.id]).map(x=>h('span',{key:x.id,className:'chip',style:{marginRight:4}},x.label))
        ),
        roommatePrefs.filter(x=>prefs[x.id]).length>0&&h('div',{style:{marginBottom:8}},
          h('div',{style:{fontSize:11,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:0.5,marginBottom:4}},'Roommate Must-Haves'),
          roommatePrefs.filter(x=>prefs[x.id]).map(x=>h('span',{key:x.id,className:'chip',style:{marginRight:4}},x.emoji,' ',x.label))
        ),
        locationPrefs.filter(x=>prefs[x.id]).length>0&&h('div',{style:{marginBottom:8}},
          h('div',{style:{fontSize:11,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:0.5,marginBottom:4}},'Location Must-Haves'),
          locationPrefs.filter(x=>prefs[x.id]).map(x=>h('span',{key:x.id,className:'chip',style:{marginRight:4}},x.emoji,' ',x.label))
        ),
        (housing.desiredLocations||[]).length>0&&h('div',null,
          h('div',{style:{fontSize:11,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:0.5,marginBottom:6}},'Cities / Towns I Want to Live In'),
          (housing.desiredLocations||[]).map((loc,i)=>
            h('div',{key:i,style:{display:'flex',alignItems:'center',gap:8,marginBottom:4}},
              h('span',{style:{fontSize:14}},'📍'),
              h('span',{style:{fontSize:13,fontWeight:600}},loc.displayName),
              h('a',{href:`https://www.google.com/maps/search/${encodeURIComponent(loc.displayName)}`,target:'_blank',style:{fontSize:11,color:'var(--blue)',textDecoration:'none'}},
                h('span',{style:{fontSize:10}},'View Map ↗')
              )
            )
          )
        )
      ),
      // Help footer
      h('div',{style:{background:'rgba(59,130,246,0.06)',border:'1px solid rgba(59,130,246,0.15)',borderRadius:12,padding:14,textAlign:'center',marginBottom:8}},
        h('div',{style:{fontSize:20,marginBottom:4}},'💡'),
        h('div',{style:{fontSize:12,color:'var(--text2)',lineHeight:1.6}},'Share this wish list with your instructor or caseworker — they can help you find housing that matches what you\'re looking for!')
      )
    )
  );
};

  const rights=[

    },
    {
      emoji:'🗣️',
      title:'You Can Speak Up',

    {

    },
    {
      emoji:'💼',
      title:'You Can Work and Be Part of the Community',

    },
    {
      emoji:'📋',
      title:'You Help Plan Your Services (IPP)',
      summary:'You are part of making your own service plan.',
      detail:'You and your family have the right to be part of creating your Individual Program Plan (IPP). This is the plan that decides what services and support you get. You can bring people you trust to your IPP meetings. You can agree or disagree with parts of the plan, and your opinion matters.'
    },
    {
      emoji:'🚫',
      title:'You Can Say No',
      summary:'You have the right to refuse services or activities.',

    },
    {
      emoji:'⚖️',

      summary:'If something seems unfair, you can ask for a review.',

    },
  ];

  const lanterman=[
    {
      emoji:'📜',
      title:'What is the Lanterman Act?',

      detail:'The Lanterman Developmental Disabilities Services Act is a California law passed in 1969. It says that people with developmental disabilities have the right to services and supports that help them live as independently as possible. The law created the regional center system — like ALTA and VMRC — to help people get those services.'
    },
    {
      emoji:'🏛️',
      title:'Regional Centers Must Help You',
      summary:'Your regional center is required by law to support you.',
      detail:'Under the Lanterman Act, your regional center (like Alta California Regional Center or Valley Mountain Regional Center) must work with you to figure out what services you need. They must provide or arrange those services. They cannot just say no without a good reason and a fair process.'
    },
    {
      emoji:'🎯',
      title:'Services Must Match Your Needs',
      summary:'Your services are designed specifically for you.',
      detail:'The Lanterman Act says your services must be based on your individual needs — not a one-size-fits-all plan. Your IPP (Individual Program Plan) is created just for you. Services like Independent Living Skills (ILS) — what CCS provides — help you learn skills you need for everyday life.'
    },
    {

      title:'Your Plan Can Be Changed',
